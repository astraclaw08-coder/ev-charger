name: CI/CD Env Promotion

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-env-promotion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    name: Build + validate with env-scoped DATABASE_URL
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    env:
      APP_ENV: ${{ github.ref_name == 'main' && 'production' || 'development' }}
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate required env wiring
        run: |
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL in GitHub environment secrets" && exit 1)
          echo "APP_ENV=$APP_ENV"
          echo "DATABASE_URL is set (value hidden)."

      - name: Build shared + api
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/api


  deploy-note:
    name: Deployment handoff note
    runs-on: ubuntu-latest
    needs: [build-and-validate]
    if: ${{ success() }}
    steps:
      - name: Summary
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Validated production env secret selection (APP_ENV=production)."
            echo "Next: trigger production deploy (Railway/Vercel) using production environment secrets."
          else
            echo "Validated development env secret selection (APP_ENV=development)."
            echo "Next: trigger dev deploy targets using development environment secrets."
          fi
