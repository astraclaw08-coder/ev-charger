name: UIUX Artifacts

on:
  pull_request:
    paths:
      - '.github/workflows/uiux-artifacts.yml'
      - 'packages/portal/**'
      - 'docs/uiux/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - task-0028-claude
    paths:
      - '.github/workflows/uiux-artifacts.yml'
      - 'packages/portal/**'
      - 'docs/uiux/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=packages/portal

      - name: Upload Storybook static artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/portal/storybook-static
          if-no-files-found: error
          retention-days: 14

  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:playwright --workspace=packages/portal

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/portal/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: packages/portal/test-results
          if-no-files-found: warn
          retention-days: 14
