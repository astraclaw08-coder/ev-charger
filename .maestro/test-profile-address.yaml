appId: dev.evcharger.app.lumeodev
---
- launchApp
- waitForAnimationToEnd:
    timeout: 30000

# Wait for sign-in screen
- extendedWaitUntil:
    visible:
      id: "keycloak-email-toggle"
    timeout: 60000

- takeScreenshot: 01-sign-in

# Open email/keycloak login
- tapOn:
    id: "keycloak-email-toggle"
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: 02-email-form

# Enter username
- tapOn:
    id: "keycloak-username-input"
- inputText: "sdang3209@gmail.com"

# Enter password
- tapOn:
    id: "keycloak-password-input"
- inputText: "DevPass#2026"

- takeScreenshot: 03-creds

# Sign in
- tapOn: "Sign In"
- waitForAnimationToEnd:
    timeout: 15000

# Dismiss iOS "Save Password?" prompt if it appears
- tapOn:
    text: "Not Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: 04-signed-in

# Go to Profile tab
- tapOn: "Profile, tab, 5 of 5"
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: 05-profile

# Find Site Address
- scrollUntilVisible:
    element:
      text: "Site Address"
    direction: DOWN
    timeout: 10000

- takeScreenshot: 06-address-visible

# Tap the address autocomplete input
- tapOn: "Start typing an address.*"
- waitForAnimationToEnd:
    timeout: 2000

# Type address
- inputText: "1600 Amphitheatre"
- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: 07-typed

# Wait for Google suggestions
- extendedWaitUntil:
    visible:
      text: ".*Amphitheatre.*"
    timeout: 15000

- takeScreenshot: 08-suggestions

# Select first suggestion
- tapOn:
    text: ".*Amphitheatre.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: 09-selected

# Final
- takeScreenshot: 10-final
